stages:
  - build

build-container:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.0-debug
    entrypoint: [""]
  script:
    - echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$(echo -n ${GITHUB_USERNAME}:${GITHUB_TOKEN} | base64)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ghcr.io/mjfi2sb3/kmer-gwas-cpp:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG
